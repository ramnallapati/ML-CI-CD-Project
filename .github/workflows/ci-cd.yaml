# Workflow name
name: CI Pipeline

# Run whenever code is pushed to or a pull request is opened against the main branch
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# A workflow can contain multiple jobs
jobs:
  test:
    # GitHub creates an Ubuntu virtual machine
    runs-on: ubuntu-latest

    steps:
      # Download the repository onto the virtual machine
      - name: Checkout code
        uses: actions/checkout@v3

      # Install Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # Install project dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip show fastapi
          pip show starlette
          pip show httpx
          pip list

      # Run all tests
      - name: Run tests
        run: pytest